name: React frontend pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag for the Docker image (e.g., v1.0.0)"
        required: true
        default: "latest"

jobs:
  frontend-test:
    name: Run React Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Mock NPM Install & Test
        run: |
          echo "Running npm install..."
          echo "Running npm test on Node ${{ matrix.node-version }}..."
          echo "Tests Passed successfully on Node ${{ matrix.node-version }}!"

      - name: Custom warning command
        if: failure()
        run: echo "::warning::Tests failed on Node ${{ matrix.node-version }}. Please check the logs for details."

  docker-build-push:
    name: Build & Push Container
    needs: frontend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Mock Docker Login & Push
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME || 'asem_mock_user'}}
        run: |
          echo "Logging in to Docker Hub as $DOCKER_USER..."
          echo "Building Docker image with tag: ${{ inputs.image_tag }}..."
          echo "Pushing Docker image to registry..."
          echo "Docker image pushed successfully with tag: ${{ inputs.image_tag || 'latest' }}!"
